<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="ERP-EDU is a complete, multi-branch production-grade Education ERP SaaS Platform for schools, colleges, and university groups." />
    <meta name="keywords" content="Education ERP, School Management Software, SaaS ERP, College ERP" />
    <meta name="author" content="ERP-EDU Ltd." />
    
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <title>ERP-EDU | Enterprise Education ERP SaaS Platform</title>
    
    <style>
      body {
        font-family: 'Outfit', 'Inter', sans-serif;
      }
    </style>
  </head>
  <body>
    <!-- Theme init: runs before React to prevent flash of white -->
    <script>
      (function() {
        var theme = localStorage.getItem('theme') || 'dark';
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
          document.body && document.body.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
